<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <p>Appuyez sur la barre rouge et voyez ce qu'il se passe</p>

    <div class="btn"></div>

    <div class="ball"></div>


    <style>

    #id1 {

        background-color: yellow;
    }

    #id2 {

        background-color: red;

    }

    .mes-art {

        height:500px;
        width:500px;
    }



.ball {
    width: 175px;
    height: 175px;
    background: blueviolet;
    margin-bottom: 1rem;
    border-radius: 50%;
    transform: scale(0.1);
    transition: transform 4000ms;
}

.btn {
    background:red;
    font-size: 23px;
    width:20%;
    cursor: pointer;
    padding: 1.85rem 3rem;
    border-radius: 10rem;}


    .btn:active + .ball{
        transform: scale(1.0);
    }




    </style>
</body>
</html>
